name: "Macrobase Agnes 1 Motion Bring-Up"
board: "Macrobase ESP-WROOM-32 6-Axis CNC"
# Active-low STEP preserves the DM442 common-anode inputs.
# X/Y distance and direction are calibrated; Z remains manual-only.
# X/Y top-right positive-end homing is enabled; Z has no limit or homing cycle.
# Hard limits remain off until the first homing cycle is verified.
i2so:
  bck_pin: gpio.22
  data_pin: gpio.21
  ws_pin: gpio.17
stepping:
  engine: I2S_STREAM
  idle_ms: 255
  pulse_us: 4
  dir_delay_us: 6
  disable_delay_us: 0
axes:
  x:
    steps_per_mm: 160
    max_rate_mm_per_min: 10000
    acceleration_mm_per_sec2: 300
    max_travel_mm: 400
    soft_limits: false
    homing:
      cycle: 1
      allow_single_axis: true
      positive_direction: true
      mpos_mm: 0
      feed_mm_per_min: 200
      seek_mm_per_min: 3000
      settle_ms: 250
      seek_scaler: 1.1
      feed_scaler: 1.1
    motor0:
      limit_pos_pin: gpio.33:low:pu
      hard_limits: false
      pulloff_mm: 3
      stepstick:
        step_pin: I2SO.2:low
        direction_pin: I2SO.1:low
  y:
    steps_per_mm: 160
    max_rate_mm_per_min: 10000
    acceleration_mm_per_sec2: 300
    max_travel_mm: 300
    soft_limits: false
    homing:
      cycle: 1
      allow_single_axis: true
      positive_direction: true
      mpos_mm: 0
      feed_mm_per_min: 200
      seek_mm_per_min: 3000
      settle_ms: 250
      seek_scaler: 1.1
      feed_scaler: 1.1
    motor0:
      limit_pos_pin: gpio.32:low:pu
      hard_limits: false
      pulloff_mm: 3
      stepstick:
        step_pin: I2SO.5:low
        direction_pin: I2SO.4:low
  z:
    steps_per_mm: 400
    max_rate_mm_per_min: 100
    acceleration_mm_per_sec2: 10
    max_travel_mm: 300
    motor0:
      stepstick:
        step_pin: I2SO.10:low
        direction_pin: I2SO.9:low
start:
  must_home: false
  check_limits: false
PWM:
  pwm_hz: 5000
  direction_pin: NO_PIN
  output_pin: gpio.27
  enable_pin: NO_PIN
  disable_with_s0: true
  s0_with_disable: true
  spinup_ms: 0
  spindown_ms: 0
  tool_num: 0
  speed_map: 0=0.000% 1000=100.000%
  off_on_alarm: true