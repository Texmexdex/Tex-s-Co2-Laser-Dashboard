name: "Macrobase Agnes 1 Motion Bring-Up"
board: "Macrobase ESP-WROOM-32 6-Axis CNC"
# Active-low STEP preserves the DM442 common-anode inputs (do not change).
# X/Y direction pins are ':low' (inverted). This is the CORRECT, verified
#   FluidNC direction: +X moves right, +Y moves toward the top, and homing
#   drives to the top-right switches.
#   mpos_mm is set to max travel so the top-right home corner reads (400,300)
#   and the work envelope is POSITIVE: 0 -> 400 (X), 0 -> 300 (Y). This
#   matches LightBurn's positive workspace so jobs stay in bounds.
# Do NOT change these to fix LightBurn — LightBurn direction is set by its
#   own Origin (top-right) and Mirror (off) settings, not by this file.
# Z remains manual-only: no limit pin and no homing cycle.
# Hard/soft limits stay off until the first homing cycle is verified.
i2so:
  bck_pin: gpio.22
  data_pin: gpio.21
  ws_pin: gpio.17
stepping:
  engine: I2S_STREAM
  idle_ms: 255
  pulse_us: 4
  dir_delay_us: 6
  disable_delay_us: 0
axes:
  x:
    steps_per_mm: 160
    max_rate_mm_per_min: 10000
    acceleration_mm_per_sec2: 300
    max_travel_mm: 400
    soft_limits: false
    homing:
      cycle: 1
      allow_single_axis: true
      positive_direction: true
      mpos_mm: 400
      feed_mm_per_min: 200
      seek_mm_per_min: 3000
      settle_ms: 250
      seek_scaler: 1.1
      feed_scaler: 1.1
    motor0:
      limit_pos_pin: gpio.32:low:pu
      hard_limits: false
      pulloff_mm: 3
      stepstick:
        step_pin: I2SO.2:low
        direction_pin: I2SO.1:low
  y:
    steps_per_mm: 160
    max_rate_mm_per_min: 10000
    acceleration_mm_per_sec2: 300
    max_travel_mm: 300
    soft_limits: false
    homing:
      cycle: 1
      allow_single_axis: true
      positive_direction: true
      mpos_mm: 300
      feed_mm_per_min: 200
      seek_mm_per_min: 3000
      settle_ms: 250
      seek_scaler: 1.1
      feed_scaler: 1.1
    motor0:
      limit_pos_pin: gpio.33:low:pu
      hard_limits: false
      pulloff_mm: 3
      stepstick:
        step_pin: I2SO.5:low
        direction_pin: I2SO.4:low
  z:
    steps_per_mm: 400
    max_rate_mm_per_min: 100
    acceleration_mm_per_sec2: 10
    max_travel_mm: 300
    motor0:
      stepstick:
        step_pin: I2SO.10:low
        direction_pin: I2SO.9:low
start:
  must_home: false
  check_limits: false
# Laser spindle type enables FluidNC laser mode: it supports M4 dynamic
#   power (power scales with speed for clean photo edges) and does NOT fire
#   during G0 rapids. This is why $32 is read-only -- laser mode is set here
#   by using the 'Laser:' type, not by the $32 command.
# Same GPIO27 output, 5 kHz, and S0-S1000 map as before, so the firing
#   threshold is unchanged. Both M3 (constant) and M4 (dynamic) now work.
# To revert to plain constant-power behavior, rename 'Laser:' back to 'PWM:'.
Laser:
  pwm_hz: 5000
  output_pin: gpio.27
  enable_pin: NO_PIN
  disable_with_s0: false
  s0_with_disable: false
  tool_num: 0
  speed_map: 0=0.000% 1000=100.000%
  off_on_alarm: true
